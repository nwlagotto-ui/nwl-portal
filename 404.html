<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
// GitHub Pages 404 redirect — preserves ?id= query parameter
// This handles the case where someone navigates directly to /?id=X
var l = window.location;
l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
  l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
  l.pathname.slice(1).replace(/&/g, '~and~') +
  (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
  l.hash);
</script>
</head>
<body></body>
</html>
